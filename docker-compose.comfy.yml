version: '3.8'

services:
  comfyui:
    image: ghcr.io/ai-dock/comfyui:rocm-630-latest
    container_name: inference-comfyui
    network_mode: "service:tailscale"
    depends_on:
      tailscale:
        condition: service_started
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    environment:
      - SERVICE_NAME=comfyui
      - HSA_OVERRIDE_GFX_VERSION=12.0.0
      - SOPS_AGE_KEY_FILE=/run/secrets/age_keys.txt
    entrypoint: ["/bin/bash", "/scripts/entrypoint.sh"]
    command: python3 main.py --listen 0.0.0.0
    volumes:
      - ./comfyui/models:/home/user/comfyui/models
      - ./comfyui/input:/home/user/comfyui/input
      - ./comfyui/output:/home/user/comfyui/output
      - ${DOCS_ASSETS:-${HOME}/docs/assets}:/home/user/comfyui/output_shared:rw
      - ${SECRETS_DIR:-../turnstone-stack-secrets}/secrets.yaml:/run/secrets/secrets.yaml:ro
      - ./scripts:/scripts:ro
      - ${AGE_KEYS_FILE:-${HOME}/.config/sops/age/keys.txt}:/run/secrets/age_keys.txt:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  tailscale:
    image: tailscale/tailscale:v1.78.0
    container_name: inference-tailscale
    hostname: ${INFERENCE_HOSTNAME:-inference-stack}
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - TS_AUTHKEY_FILE=/run/secrets/ts_authkey
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - ./tailscale_state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
      - ${SECRETS_DIR:-../turnstone-stack-secrets}/.ts_authkey:/run/secrets/ts_authkey:ro
    healthcheck:
      test: ["CMD", "tailscale", "status"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
